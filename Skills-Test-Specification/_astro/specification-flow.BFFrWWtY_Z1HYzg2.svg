<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Skills Test Specification workflow</title>
  <desc id="desc">A workflow diagram showing skill trigger, dry-run plan, contract validation, edge handling, and routing report.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="960" height="640" rx="36" fill="url(#bg)"/>
  <circle cx="794" cy="98" r="92" fill="#dbeafe"/>
  <circle cx="120" cy="540" r="120" fill="#ccfbf1"/>
  <path d="M98 176c78-74 198-102 322-64 106 33 158 11 245-38 63-35 139-24 190 29 74 76 51 209-45 264-82 47-163 25-244 69-90 49-136 140-264 122-159-23-303-152-284-296 4-34 31-70 80-86Z" fill="#ffffff" opacity=".72"/>

  <g filter="url(#shadow)">
    <rect x="116" y="116" width="728" height="408" rx="28" fill="#ffffff"/>
  </g>

  <text x="160" y="178" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Skill Test Specification</text>
  <text x="160" y="212" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">Reusable checks for triggers, plans, contracts, edge cases, and failure routing.</text>

  <g font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="160" y="264" width="128" height="94" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="190" cy="294" r="14" fill="#2563eb"/>
      <text x="214" y="301" font-size="17" font-weight="700" fill="#0f172a">Trigger</text>
      <text x="184" y="330" font-size="13" fill="#475569">Should use?</text>
    </g>
    <path d="M298 311h58" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="m348 300 13 11-13 11" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g>
      <rect x="368" y="264" width="128" height="94" rx="18" fill="#f0fdfa" stroke="#99f6e4"/>
      <circle cx="398" cy="294" r="14" fill="#0f766e"/>
      <text x="422" y="301" font-size="17" font-weight="700" fill="#0f172a">Plan</text>
      <text x="392" y="330" font-size="13" fill="#475569">Dry-run only</text>
    </g>
    <path d="M506 311h58" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <path d="m556 300 13 11-13 11" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <g>
      <rect x="576" y="264" width="128" height="94" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
      <circle cx="606" cy="294" r="14" fill="#ea580c"/>
      <text x="630" y="301" font-size="17" font-weight="700" fill="#0f172a">Contract</text>
      <text x="600" y="330" font-size="13" fill="#475569">Stable output</text>
    </g>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="176" y="410" width="250" height="64" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <path d="M206 433h42M206 451h78" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <text x="304" y="450" font-size="16" font-weight="700" fill="#0f172a">Edge handling</text>

    <rect x="474" y="410" width="250" height="64" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <path d="M510 442h66" stroke="url(#primary)" stroke-width="5" stroke-linecap="round"/>
    <path d="m566 428 18 14-18 14" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="606" y="450" font-size="16" font-weight="700" fill="#0f172a">Routing report</text>
  </g>

  <g transform="translate(744 238)">
    <rect width="64" height="158" rx="18" fill="url(#primary)"/>
    <circle cx="32" cy="36" r="10" fill="#fff"/>
    <circle cx="32" cy="79" r="10" fill="#bfdbfe"/>
    <circle cx="32" cy="122" r="10" fill="#99f6e4"/>
  </g>
</svg>
